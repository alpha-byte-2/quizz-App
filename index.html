<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="questions">
        <span>?</span>
        <span>?</span>
        <span>?</span>
        <span>?</span>
        <span>?</span>
        <span>?</span>
        <span>?</span>


    </div>


    <!--FLOATING Stars  -->
    <div class="stars">

        <span>*</span>
        <span>*</span>
        <span>*</span>
        <span>*</span>
        <span>*</span>
        <span>*</span>
        <span>*</span>
        <span>*</span>
        <span>*</span>
        <span>*</span>

    </div>

    <div class="container">

        <div class="sidebar" id="sidebar">

            <div class="menu" id="menu">
                ☰
            </div>

            <ul>
                <li id="home"><a href="#">Home</a></li>
                <li><a href="#">History</a></li>
                <li><a href="#">Logout</a></li>
                <li><a href="#">About Us</a></li>
            </ul>

        </div>




        <!-- FLOATING QUESTION MARKS -->

        <div id="homescreen" class="main">

            <div class="main">




                <h1 class="title">QUIZ MASTER</h1>

                <!-- LOGO -->

                <div class="logo">

                    <img src="image/logo.png" alt="logo">

                </div>

                <div class="tagline">
                    Challenge Your Knowledge Everyday
                </div>

                <!-- BUTTONS -->

                <div class="buttons">

                    <button id="newGameBtn">New Game</button>

                    <button>History</button>

                </div>

                <div class="feedback">

                    <button>Feedback</button>

                </div>

            </div>

        </div>


        <div id="gameSetup" class="main" style="display:none;">


            <div class="game-setup">
                <label>Number of Players:</label>
                <input type="number" id="players" min="1" max="10">

                <label>Number of Question</label>
                <input type="number" id="questionCount" min="1" max="50" value="5">



                <div id="playerInputs"></div>


                <button id="startGameBtn">Start Game</button>
            </div>

        </div>
        <div id="quizScreen" class="main" style="display:none;">


            <div class="quiz-container">

                <h2 id="questionNumber">
                    Question 1
                </h2>

                <div class="question-box">
                    <p id="questionText"></p>
                </div>

                <div id="optionsContainer" class="options-container">

                </div>

                <h3 class="player-turn">
                    Player :
                    <span id="currentPlayer"></span>
                </h3>

            </div>

        </div>

        <div id="scoreboard" class="main" style="display:none;">
            <div class="scoreboard-wrapper">

                <div class="scoreboard-title">
                    <span class="trophy">🏆</span>
                    <h1>Final Scoreboard</h1>
                    <!-- <p class="sb-subtitle">+10 correct &nbsp;·&nbsp; −2 wrong</p> -->
                     <p class="sb-subtitle">+10 correct ·  −2 wrong</p>
                </div>

                <table id="scoreTable">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player</th>
                            <th>Score</th>
                            <th>Time (sec)</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>

                <div class="sb-btn-row">
                    <button onclick="location.reload()">Play Again</button>
                </div>

            </div>
        </div>



    </div>



    <script src="script.js"></script>

</body>

</html>
